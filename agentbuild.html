<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Coding Agent — Build Guide</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #08090f;
            --surface: #0d0e18;
            --card: #111222;
            --border: #1c1e30;
            --border2: #252840;
            --text: #d0d8f0;
            --sub: #7880a0;
            --dim: #383c58;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Plus Jakarta Sans', sans-serif;
            --sidebar-w: 268px;
            --topbar-h: 56px;
            --c: #60a5fa;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100dvh;
        }

        /* Shell */
        #shell {
            display: flex;
            height: 100dvh;
            position: relative;
        }

        /* Mobile topbar */
        #topbar {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--topbar-h);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            z-index: 200;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
        }

        #menu-btn {
            width: 38px;
            height: 38px;
            background: var(--card);
            border: 1px solid var(--border2);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 18px;
            transition: background 0.15s;
        }

        #menu-btn:hover {
            background: var(--border2);
        }

        #topbar-title {
            font-family: var(--sans);
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #topbar-step {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 5px;
            border: 1px solid;
            flex-shrink: 0;
        }

        /* Overlay */
        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 299;
            backdrop-filter: blur(2px);
        }

        #overlay.open {
            display: block;
        }

        /* Sidebar */
        #sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
            transition: transform 0.28s cubic-bezier(.4, 0, .2, 1);
            z-index: 300;
        }

        .sidebar-head {
            padding: 22px 18px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sidebar-eyebrow {
            font-family: var(--mono);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 5px;
        }

        .sidebar-name {
            font-family: var(--sans);
            font-size: 16px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        #sidebar-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0 24px;
        }

        #sidebar-scroll::-webkit-scrollbar {
            width: 3px;
        }

        #sidebar-scroll::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 2px;
        }

        .phase-group {
            margin-bottom: 4px;
        }

        .phase-lbl {
            font-family: var(--mono);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            padding: 10px 18px 4px;
            display: block;
        }

        .step-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            background: transparent;
            border: none;
            border-left: 2px solid transparent;
            padding: 8px 16px 8px 18px;
            cursor: pointer;
            text-align: left;
            transition: background 0.12s, border-color 0.12s;
        }

        .step-btn:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .step-btn.active {
            background: color-mix(in srgb, var(--c) 10%, transparent);
            border-left-color: var(--c);
        }

        .s-icon {
            width: 30px;
            height: 30px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            background: var(--card);
            border: 1px solid var(--border);
            flex-shrink: 0;
            transition: background 0.12s, border-color 0.12s;
        }

        .step-btn.active .s-icon {
            background: color-mix(in srgb, var(--c) 18%, transparent);
            border-color: color-mix(in srgb, var(--c) 35%, transparent);
        }

        .s-text {
            min-width: 0;
        }

        .s-title {
            font-size: 12px;
            font-weight: 500;
            color: var(--sub);
            line-height: 1.35;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.12s;
        }

        .step-btn.active .s-title {
            color: var(--c);
            font-weight: 700;
        }

        .s-day {
            font-family: var(--mono);
            font-size: 9px;
            color: var(--dim);
            margin-top: 1px;
        }

        /* Main */
        #main {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        #main::-webkit-scrollbar {
            width: 4px;
        }

        #main::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 3px;
        }

        #progress-strip {
            height: 2px;
            background: var(--border);
            flex-shrink: 0;
            position: relative;
        }

        #progress-fill {
            height: 100%;
            border-radius: 1px;
            transition: width 0.4s ease, background 0.3s;
            position: absolute;
            left: 0;
            top: 0;
        }

        #content {
            flex: 1;
            padding: 32px 40px 56px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        /* Step header */
        .meta-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .badge {
            font-family: var(--mono);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 5px;
            border: 1px solid color-mix(in srgb, var(--c) 35%, transparent);
            background: color-mix(in srgb, var(--c) 10%, transparent);
            color: var(--c);
        }

        .day-tag {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--sub);
        }

        .page-title {
            font-family: var(--sans);
            font-size: clamp(17px, 2.4vw, 25px);
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.4px;
            line-height: 1.25;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-sum {
            font-size: clamp(12.5px, 1.4vw, 14px);
            color: var(--sub);
            line-height: 1.7;
            margin-bottom: 26px;
            padding-bottom: 22px;
            border-bottom: 1px solid var(--border);
        }

        /* Concepts */
        .eyebrow {
            font-family: var(--mono);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 12px;
        }

        .concept-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px 18px;
            margin-bottom: 10px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .concept-card:hover {
            border-color: var(--border2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .concept-h {
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 700;
            color: var(--c);
            margin-bottom: 7px;
        }

        .concept-b {
            font-size: clamp(12px, 1.35vw, 13px);
            color: #8898c0;
            line-height: 1.75;
            white-space: pre-line;
        }

        /* Code block */
        .code-section {
            margin-top: 26px;
        }

        .code-hdr {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .toggle-btn {
            font-family: var(--mono);
            font-size: 10px;
            background: var(--card);
            border: 1px solid var(--border2);
            border-radius: 5px;
            padding: 4px 12px;
            color: var(--sub);
            cursor: pointer;
            transition: all 0.15s;
        }

        .toggle-btn:hover {
            background: var(--border2);
            color: var(--text);
        }

        .code-box {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border2);
        }

        .code-topbar {
            background: #09090e;
            padding: 9px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .mac-dots {
            display: flex;
            gap: 6px;
        }

        .mac-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .code-lbl {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 700;
            color: var(--sub);
        }

        .copy-btn {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 700;
            background: var(--border2);
            border: none;
            border-radius: 5px;
            padding: 4px 12px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.18s;
        }

        .copy-btn:hover {
            background: #303555;
        }

        .copy-btn.ok {
            background: rgba(52, 211, 153, 0.15);
            color: #34d399;
        }

        .code-scroll {
            background: #07080e;
            overflow-x: auto;
            padding: 10px 0;
        }

        .code-scroll::-webkit-scrollbar {
            height: 4px;
        }

        .code-scroll::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 3px;
        }

        table.ct {
            border-collapse: collapse;
            min-width: 100%;
        }

        .ln {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--dim);
            text-align: right;
            padding: 0 12px;
            user-select: none;
            min-width: 38px;
            vertical-align: top;
            line-height: 1.7;
            border-right: 1px solid var(--border);
            white-space: nowrap;
        }

        .lc {
            font-family: var(--mono);
            font-size: clamp(11px, 1.25vw, 12.5px);
            padding: 0 20px 0 14px;
            white-space: pre;
            line-height: 1.7;
            color: #bcc8e8;
        }

        .sc {
            color: #42485e;
        }

        .ss {
            color: #82c99a;
        }

        .sk {
            color: #c196f0;
        }

        .sl {
            color: #78d0e0;
        }

        .sn {
            color: #f4956a;
        }

        /* Nav */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 36px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            gap: 10px;
        }

        .nav-btn {
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.18s;
            border: 1px solid var(--border2);
            background: var(--card);
            color: var(--sub);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--border2);
            color: var(--text);
        }

        .nav-btn:disabled {
            opacity: 0.22;
            cursor: default;
        }

        .nav-btn.fwd {
            background: color-mix(in srgb, var(--c) 12%, transparent);
            border-color: color-mix(in srgb, var(--c) 38%, transparent);
            color: var(--c);
        }

        .nav-btn.fwd:hover:not(:disabled) {
            background: color-mix(in srgb, var(--c) 22%, transparent);
        }

        .pip-row {
            display: flex;
            gap: 5px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            flex: 1;
        }

        .pip {
            width: 6px;
            height: 6px;
            border-radius: 3px;
            cursor: pointer;
            background: var(--dim);
            transition: all 0.2s;
        }

        .pip.on {
            width: 20px;
        }

        /* Mobile */
        @media (max-width: 768px) {
            #topbar {
                display: flex;
            }

            #sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100dvh;
                transform: translateX(-100%);
                box-shadow: 4px 0 32px rgba(0, 0, 0, 0.5);
            }

            #sidebar.open {
                transform: translateX(0);
            }

            #main {
                padding-top: var(--topbar-h);
            }

            #content {
                padding: 20px 18px 48px;
            }

            .page-title {
                font-size: 18px;
            }

            .nav-btn {
                padding: 9px 14px;
                font-size: 12px;
            }

            .concept-card {
                padding: 13px 15px;
            }
        }

        @media (max-width: 420px) {
            #content {
                padding: 16px 14px 44px;
            }

            .page-title {
                font-size: 16px;
            }

            .concept-b {
                font-size: 12px;
            }

            .nav-btn {
                padding: 9px 12px;
                font-size: 11px;
            }

            .pip-row {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div id="topbar">
        <button id="menu-btn" onclick="toggleSidebar()" aria-label="Open menu">☰</button>
        <div id="topbar-title">Loading…</div>
        <div id="topbar-step" class="badge"></div>
    </div>

    <div id="overlay" onclick="closeSidebar()"></div>

    <div id="shell">
        <nav id="sidebar">
            <div class="sidebar-head">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center; gap: 8px; margin-bottom: 16px; padding: 6px 10px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 6px; font-size: 11px; font-weight: 600; color: var(--sub);">
                    <span>🏠</span> Dashboard
                </a>
                <div class="sidebar-eyebrow">Build Guide</div>
                <div class="sidebar-name">🤖 Coding Agent</div>
            </div>
            <div id="sidebar-scroll"></div>
        </nav>

        <main id="main">
            <div id="progress-strip">
                <div id="progress-fill"></div>
            </div>
            <div id="content"></div>
        </main>
    </div>

    <script>
        const PC = {
            "Foundation": "#60a5fa",
            "Core Build": "#a78bfa",
            "Hardening": "#f59e0b",
            "Advanced": "#34d399",
            "Ship It": "#f472b6",
        };

        const STEPS = [
            {
                id: 1, phase: "Foundation", title: "Understand the Architecture", duration: "Day 1", icon: "🏗️",
                summary: "Know exactly what you're building before writing a single line of code. A solid mental model of the agent loop will save you hours of debugging later.",
                concepts: [
                    {
                        h: "What a Coding Agent Actually Is",
                        b: "A coding agent is an LLM running in a loop that can:\n• Read a task description\n• Write code to solve it\n• Execute that code in a sandbox\n• Observe the output or error\n• Revise and retry — autonomously\n\nCore loop: Think → Write → Run → Observe → Repeat"
                    },
                    {
                        h: "The 5 Core Components",
                        b: "1. Planner — breaks the task into subtasks\n2. Code Writer — generates Python/JS/shell code\n3. Executor — runs code safely in a Docker sandbox\n4. Observer — reads stdout, stderr, exit codes\n5. Memory — maintains context across the full loop"
                    },
                    {
                        h: "ReAct Pattern (Reason + Act)",
                        b: "Every step follows: Thought → Action → Observation\n\nThe model reasons about what to do next, calls a tool (action), reads the result (observation), then reasons again. This continues until the task is done or a step limit is reached."
                    },
                    {
                        h: "Why Claude for Coding Agents",
                        b: "• 200k token context window — essential for long agentic runs\n• Superior instruction-following for structured tool use\n• Lower rate of hallucinated function calls\n• Recommended model: claude-sonnet-4-20250514"
                    }
                ],
                code: null
            },

            {
                id: 2, phase: "Foundation", title: "Set Up Project & Environment", duration: "Day 1–2", icon: "⚙️",
                summary: "Scaffold the project correctly from the start. A clean layout makes every subsequent step easier to implement and far easier to debug when things go wrong.",
                concepts: [
                    {
                        h: "Recommended Project Structure",
                        b: "coding-agent/\n├── agent/\n│   ├── __init__.py\n│   ├── core.py          # main agent loop\n│   ├── tools.py         # tool definitions\n│   ├── executor.py      # Docker sandbox\n│   └── memory.py        # context management\n├── sandbox/\n│   └── Dockerfile       # isolated execution env\n├── tests/\n├── .env                 # secrets — never commit\n└── main.py"
                    },
                    {
                        h: "Key Dependencies",
                        b: "anthropic>=0.25.0   # Claude SDK\ndocker>=7.0.0       # sandbox execution\npydantic>=2.0       # tool schema validation\nrich>=13.0          # pretty terminal output\npython-dotenv       # environment variables\nfastapi + uvicorn   # optional: expose as REST API"
                    }
                ],
                code: [
                    "# Install all dependencies in one shot",
                    "pip install anthropic docker pydantic rich python-dotenv",
                    "",
                    "# .env — NEVER commit this file to git",
                    "ANTHROPIC_API_KEY=sk-ant-...",
                    "MAX_AGENT_STEPS=25",
                    "SANDBOX_TIMEOUT_SECONDS=30",
                    "",
                    "# main.py — entry point",
                    "from dotenv import load_dotenv",
                    "from agent.core import CodingAgent",
                    "",
                    "load_dotenv()",
                    "",
                    'if __name__ == "__main__":',
                    '    task = ("Write a Python function that finds all primes up to N "',
                    '            "using Sieve of Eratosthenes, benchmark for N=1_000_000.")',
                    "    agent  = CodingAgent()",
                    "    result = agent.run(task)",
                    "    print(result)"
                ]
            },

            {
                id: 3, phase: "Core Build", title: "Define Tools the Agent Can Use", duration: "Day 2–3", icon: "🔧",
                summary: "Tools are the agent's hands. Precise, unambiguous descriptions are critical — vague descriptions lead directly to wrong tool calls and hard-to-debug failures.",
                concepts: [
                    {
                        h: "The 4 Essential Tools",
                        b: "1. execute_code — run Python in sandbox, get stdout/stderr back\n2. read_file — read a file from the workspace\n3. write_file — write or overwrite a file\n4. list_files — list current workspace contents\n\nOptional extras: search_web, install_package, run_tests, git_commit"
                    },
                    {
                        h: "Tool Schema Rules",
                        b: "Every tool needs three parts:\n• name — use snake_case consistently\n• description — be extremely precise. The model reads this to decide WHEN to call it. Vague = broken agent.\n• input_schema — valid JSON Schema with all required fields declared\n\nSpend extra time on descriptions. They have the most impact on reliability."
                    }
                ],
                code: [
                    "# agent/tools.py",
                    "TOOLS = [",
                    "    {",
                    '        "name": "execute_code",',
                    '        "description": (',
                    '            "Execute Python code in an isolated sandbox. "',
                    '            "Returns stdout, stderr, and exit code. "',
                    '            "Use to test code, run computations, or verify output. "',
                    '            "Sandbox is stateless — variables do NOT persist between calls."',
                    "        ),",
                    '        "input_schema": {',
                    '            "type": "object",',
                    '            "properties": {',
                    '                "code":    {"type": "string",  "description": "Python code"},',
                    '                "timeout": {"type": "integer", "default": 30}',
                    "            },",
                    '            "required": ["code"]',
                    "        }",
                    "    },",
                    "    {",
                    '        "name": "write_file",',
                    '        "description": "Write content to a file in the workspace.",',
                    '        "input_schema": {',
                    '            "type": "object",',
                    '            "properties": {',
                    '                "path":    {"type": "string"},',
                    '                "content": {"type": "string"}',
                    "            },",
                    '            "required": ["path", "content"]',
                    "        }",
                    "    },",
                    "    {",
                    '        "name": "read_file",',
                    '        "description": "Read contents of a file from the workspace.",',
                    '        "input_schema": {',
                    '            "type": "object",',
                    '            "properties": {"path": {"type": "string"}},',
                    '            "required": ["path"]',
                    "        }",
                    "    },",
                    "    {",
                    '        "name": "list_files",',
                    '        "description": "List all files in the current workspace.",',
                    '        "input_schema": {"type": "object", "properties": {}}',
                    "    }",
                    "]"
                ]
            },

            {
                id: 4, phase: "Core Build", title: "Build the Secure Sandbox", duration: "Day 3–4", icon: "🐳",
                summary: "Never execute agent-generated code on your host machine. One bad execution could delete files, exfiltrate credentials, or crash your system. Docker with hard limits is mandatory.",
                concepts: [
                    {
                        h: "Why a Sandbox is Non-Negotiable",
                        b: "Agent-generated code can:\n• Delete files on your host system\n• Make unauthorized outbound network requests\n• Fork-bomb (spawn infinite child processes)\n• Import and run malicious packages\n• Exfiltrate API keys or other credentials\n\nNone of this is hypothetical — run ALL generated code in a container."
                    },
                    {
                        h: "Sandbox Security Constraints",
                        b: "• --network none — zero internet access from inside\n• Read-only host filesystem mount\n• Memory cap: 256MB maximum\n• CPU cap: 1 core maximum\n• Hard kill after N seconds (no exceptions)\n• Fresh container per execution (fully stateless)\n• Writable /tmp only (64MB limit)"
                    }
                ],
                code: [
                    "# sandbox/Dockerfile",
                    "FROM python:3.12-slim",
                    "RUN pip install numpy pandas scipy matplotlib --quiet",
                    "WORKDIR /sandbox",
                    'CMD ["python", "-c", "import sys; exec(sys.stdin.read())"]',
                    "",

        /* ── Syntax ── */
        function hl(line) {
            if (!line.trim()) return '\u00a0';
            const e = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            if (line.trim().startsWith('#')) return `<span class="sc">${e(line)}</span>`;
            if (/^\s*('"""|"""|''')/.test(line)) return `<span class="ss">${e(line)}</span>`;
            const re = /("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|\b(def|class|return|import|from|if|elif|else|for|while|try|except|raise|with|async|await|pass|in|not|and|or|True|False|None|lambda|yield|as)\b|\b(self|cls)\b|\b\d[\d_.]*\b)/g;
            let out = '', last = 0, m;
            while ((m = re.exec(line)) !== null) {
                if (m.index > last) out += `<span style="color:#bcc8e8">${e(line.slice(last, m.index))}</span>`;
                const v = m[0];
                let c = 'style="color:#bcc8e8"';
                if (v[0] === '"' || v[0] === "'") c = 'class="ss"';
                else if (m[2]) c = 'class="sk"';
                else if (m[3]) c = 'class="sl"';
                else if (/^\d/.test(v)) c = 'class="sn"';
                out += `<span ${c}>${e(v)}</span>`;
                last = m.index + v.length;
            }
            if (last < line.length) out += `<span style="color:#bcc8e8">${e(line.slice(last))}</span>`;
            return out;
        }

        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(cur + 1);
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(cur - 1);
            if (e.key === 'Escape') closeSidebar();
        });

        renderSidebar();
        renderMain();
    </script>
</body>

</html>
